<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GEIST Arcade VR Diorama</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #020006;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    #notice {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #ff3448;
      background: rgba(0, 0, 0, 0.66);
      border: 1px solid rgba(255, 0, 48, 0.5);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      max-width: 340px;
      text-shadow: 0 0 8px #ff0030;
    }
  
    #audio-start {
      position: fixed;
      left: 12px;
      bottom: 14px;
      z-index: 20;
      border: 1px solid rgba(255, 0, 64, 0.65);
      background: rgba(0, 0, 0, 0.72);
      color: #ff355d;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-shadow: 0 0 8px #ff0038;
      box-shadow: 0 0 18px rgba(255, 0, 64, 0.25);
    }

    #audio-start.playing {
      color: #8dffda;
      border-color: rgba(0, 255, 190, 0.6);
      text-shadow: 0 0 8px #00ffc8;
    }
  
    #entry-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(35, 0, 18, 0.46) 0%, rgba(0, 0, 0, 0.78) 58%, rgba(0, 0, 0, 0.92) 100%);
      backdrop-filter: blur(2px);
      pointer-events: auto;
      overflow: hidden;
    }

    #entry-overlay.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 480ms ease;
    }

    #entry-overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.028) 0px,
          rgba(255,255,255,0.028) 1px,
          transparent 2px,
          transparent 5px
        );
      opacity: 0.65;
      mix-blend-mode: screen;
      pointer-events: none;
      animation: overlayScan 8s linear infinite;
    }

    @keyframes overlayScan {
      0%   { transform: translateY(0); }
      100% { transform: translateY(18px); }
    }

    #entry-panel {
      position: relative;
      width: min(86vw, 560px);
      padding: 28px 22px 24px;
      border-radius: 18px;
      border: 1px solid rgba(255, 35, 85, 0.45);
      background:
        linear-gradient(180deg, rgba(20, 0, 12, 0.88), rgba(8, 0, 8, 0.94));
      box-shadow:
        0 0 26px rgba(255, 0, 70, 0.22),
        0 0 80px rgba(95, 0, 255, 0.08),
        inset 0 0 22px rgba(255, 0, 70, 0.08);
      text-align: center;
      overflow: hidden;
    }

    #entry-panel::before {
      content: "";
      position: absolute;
      left: -20%;
      right: -20%;
      top: -2px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,0,80,0.95), transparent);
      box-shadow: 0 0 14px rgba(255, 0, 70, 0.7);
      animation: entrySweep 2.4s linear infinite;
      pointer-events: none;
    }

    @keyframes entrySweep {
      0%   { transform: translateY(0); opacity: 0.0; }
      10%  { opacity: 1; }
      100% { transform: translateY(290px); opacity: 0.0; }
    }

    .entry-kicker {
      margin: 0 0 10px;
      font-size: 11px;
      letter-spacing: 0.34em;
      color: rgba(255, 110, 140, 0.82);
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 0, 70, 0.35);
    }

    .entry-sub {
      margin: 14px 0 0;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: rgba(190, 225, 255, 0.72);
      text-transform: uppercase;
    }

    #audio-start {
      appearance: none;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: min(76vw, 420px);
      min-height: 76px;
      margin: 12px auto 0;
      padding: 16px 22px;
      border-radius: 14px;
      border: 1px solid rgba(255, 0, 76, 0.62);
      background:
        linear-gradient(180deg, rgba(34, 0, 18, 0.95), rgba(9, 0, 8, 0.98));
      color: #ffd4dc;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      text-shadow:
        0 0 8px rgba(255, 0, 70, 0.65),
        0 0 14px rgba(255, 0, 70, 0.26);
      box-shadow:
        0 0 18px rgba(255, 0, 70, 0.22),
        inset 0 0 18px rgba(255, 30, 90, 0.10);
      overflow: hidden;
      transition: transform 140ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    #audio-start:hover,
    #audio-start:active {
      transform: translateY(-1px) scale(1.01);
      border-color: rgba(255, 60, 110, 0.85);
      box-shadow:
        0 0 22px rgba(255, 0, 70, 0.32),
        0 0 46px rgba(20, 130, 255, 0.10),
        inset 0 0 18px rgba(255, 30, 90, 0.16);
    }

    #audio-start.playing {
      color: #cffff4;
      border-color: rgba(0, 255, 190, 0.58);
      text-shadow:
        0 0 8px rgba(0, 255, 200, 0.65),
        0 0 14px rgba(0, 255, 200, 0.28);
      box-shadow:
        0 0 22px rgba(0, 255, 200, 0.16),
        inset 0 0 18px rgba(0, 255, 200, 0.10);
    }

    #audio-start::before,
    #audio-start::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    #audio-start::before {
      background:
        linear-gradient(90deg,
          rgba(255, 0, 70, 0.00) 0%,
          rgba(255, 0, 70, 0.18) 48%,
          rgba(255, 0, 70, 0.00) 100%);
      transform: translateX(-120%);
      animation: btnSweep 2.6s linear infinite;
    }

    #audio-start::after {
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          transparent 2px,
          transparent 4px
        );
      opacity: 0.32;
    }

    @keyframes btnSweep {
      0%   { transform: translateX(-120%); opacity: 0.0; }
      20%  { opacity: 1; }
      100% { transform: translateX(120%); opacity: 0.0; }
    }

    .glitch-wrap {
      position: relative;
      display: inline-block;
      line-height: 1.05;
    }

    .glitch-main,
    .glitch-red,
    .glitch-cyan {
      display: block;
      font-size: clamp(22px, 4.8vw, 34px);
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .glitch-main {
      position: relative;
      z-index: 3;
      color: #ffeaf0;
    }

    .glitch-red,
    .glitch-cyan {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0.82;
      pointer-events: none;
    }

    .glitch-red {
      color: #ff255d;
      animation: glitchRed 1.4s steps(2, end) infinite;
    }

    .glitch-cyan {
      color: #40d8ff;
      animation: glitchCyan 1.1s steps(2, end) infinite;
    }

    @keyframes glitchRed {
      0%, 88%, 100% { transform: translate(0,0); opacity: 0.0; }
      89% { transform: translate(-2px, 0); opacity: 0.9; }
      91% { transform: translate(2px, -1px); opacity: 0.6; }
      94% { transform: translate(-3px, 1px); opacity: 0.85; }
      97% { transform: translate(1px, 0); opacity: 0.0; }
    }

    @keyframes glitchCyan {
      0%, 85%, 100% { transform: translate(0,0); opacity: 0.0; }
      86% { transform: translate(2px, 0); opacity: 0.7; }
      89% { transform: translate(-1px, 1px); opacity: 0.9; }
      92% { transform: translate(3px, -1px); opacity: 0.65; }
      96% { transform: translate(0,0); opacity: 0.0; }
    }

    .entry-track {
      margin-top: 12px;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: rgba(255, 210, 225, 0.68);
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      #entry-panel {
        width: min(90vw, 520px);
        padding: 22px 16px 20px;
      }

      #audio-start {
        min-width: min(84vw, 420px);
        min-height: 70px;
        padding: 14px 14px;
      }

      .glitch-main,
      .glitch-red,
      .glitch-cyan {
        white-space: normal;
      }
    }
  
    /* enhanced entry overlay v2 */
    #entry-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(55, 0, 22, 0.34) 0%, rgba(15, 0, 10, 0.66) 38%, rgba(0, 0, 0, 0.90) 100%);
      overflow: hidden;
      isolation: isolate;
    }

    #entry-overlay.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 520ms ease;
    }

    #entry-overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.03) 0px,
          rgba(255,255,255,0.03) 1px,
          transparent 2px,
          transparent 5px
        );
      mix-blend-mode: screen;
      opacity: 0.52;
      animation: entryScanDrift 8s linear infinite;
      pointer-events: none;
    }

    #entry-overlay::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 0, 85, 0.06), transparent 26%),
        radial-gradient(circle at 18% 22%, rgba(0, 220, 255, 0.05), transparent 18%),
        radial-gradient(circle at 82% 76%, rgba(120, 0, 255, 0.06), transparent 18%);
      pointer-events: none;
      mix-blend-mode: screen;
      animation: overlayGlowBreath 6s ease-in-out infinite alternate;
    }

    @keyframes entryScanDrift {
      0% { transform: translateY(0); }
      100% { transform: translateY(18px); }
    }

    @keyframes overlayGlowBreath {
      0%   { opacity: 0.55; }
      100% { opacity: 0.95; }
    }

    .entry-bg-grid {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(255, 0, 70, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(50, 180, 255, 0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 18%, transparent 78%);
      opacity: 0.45;
      pointer-events: none;
      animation: gridFloat 12s linear infinite;
    }

    @keyframes gridFloat {
      0%   { transform: translate3d(0,0,0); }
      100% { transform: translate3d(22px,14px,0); }
    }

    .entry-floating-sparks {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .entry-floating-sparks span {
      position: absolute;
      display: block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,0,80,0.35) 55%, transparent 72%);
      box-shadow: 0 0 12px rgba(255, 0, 80, 0.5);
      opacity: 0.75;
    }

    .entry-floating-sparks span:nth-child(1) { left: 19%; top: 24%; animation: sparkFloat1 4.1s ease-in-out infinite; }
    .entry-floating-sparks span:nth-child(2) { left: 28%; top: 72%; animation: sparkFloat2 5.0s ease-in-out infinite; }
    .entry-floating-sparks span:nth-child(3) { left: 66%; top: 23%; animation: sparkFloat3 4.6s ease-in-out infinite; }
    .entry-floating-sparks span:nth-child(4) { left: 78%; top: 66%; animation: sparkFloat2 5.4s ease-in-out infinite; }
    .entry-floating-sparks span:nth-child(5) { left: 50%; top: 16%; animation: sparkFloat1 3.8s ease-in-out infinite; }
    .entry-floating-sparks span:nth-child(6) { left: 58%; top: 82%; animation: sparkFloat3 5.2s ease-in-out infinite; }

    @keyframes sparkFloat1 {
      0%,100% { transform: translate3d(0,0,0) scale(0.7); opacity: 0.38; }
      50%     { transform: translate3d(10px,-18px,0) scale(1.18); opacity: 0.95; }
    }

    @keyframes sparkFloat2 {
      0%,100% { transform: translate3d(0,0,0) scale(0.9); opacity: 0.35; }
      50%     { transform: translate3d(-14px,12px,0) scale(1.15); opacity: 0.82; }
    }

    @keyframes sparkFloat3 {
      0%,100% { transform: translate3d(0,0,0) scale(0.75); opacity: 0.42; }
      50%     { transform: translate3d(12px,16px,0) scale(1.06); opacity: 0.88; }
    }

    #entry-panel {
      position: relative;
      width: min(90vw, 660px);
      padding: 30px 28px 22px;
      border-radius: 24px;
      border: 1px solid rgba(255, 35, 90, 0.42);
      background:
        linear-gradient(180deg, rgba(30, 0, 16, 0.93), rgba(7, 0, 10, 0.96)),
        radial-gradient(circle at 50% 32%, rgba(255, 0, 80, 0.08), transparent 45%);
      box-shadow:
        0 0 24px rgba(255, 0, 76, 0.18),
        0 0 90px rgba(80, 0, 255, 0.10),
        inset 0 0 32px rgba(255, 0, 70, 0.08);
      text-align: center;
      overflow: hidden;
      isolation: isolate;
    }

    #entry-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255, 0, 76, 0.35), rgba(0, 220, 255, 0.18), rgba(255,0,76,0.22));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
      opacity: 0.8;
    }

    .entry-ornament-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      pointer-events: none;
      opacity: 0.42;
      mix-blend-mode: screen;
    }

    .entry-ornament-ring-a {
      width: 520px;
      height: 520px;
      border: 1px solid rgba(255, 30, 88, 0.18);
      box-shadow: 0 0 24px rgba(255, 0, 76, 0.12);
      animation: haloSpinA 18s linear infinite;
    }

    .entry-ornament-ring-b {
      width: 390px;
      height: 390px;
      border: 1px dashed rgba(90, 210, 255, 0.22);
      box-shadow: 0 0 18px rgba(0, 220, 255, 0.12);
      animation: haloSpinB 11s linear infinite reverse;
    }

    @keyframes haloSpinA {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes haloSpinB {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .entry-corner {
      position: absolute;
      width: 42px;
      height: 42px;
      border-color: rgba(255, 50, 100, 0.68);
      pointer-events: none;
      filter: drop-shadow(0 0 8px rgba(255,0,76,0.38));
      animation: cornerPulse 2.4s ease-in-out infinite alternate;
    }

    .entry-corner-tl { top: 14px; left: 14px; border-top: 2px solid; border-left: 2px solid; }
    .entry-corner-tr { top: 14px; right: 14px; border-top: 2px solid; border-right: 2px solid; }
    .entry-corner-bl { bottom: 14px; left: 14px; border-bottom: 2px solid; border-left: 2px solid; }
    .entry-corner-br { bottom: 14px; right: 14px; border-bottom: 2px solid; border-right: 2px solid; }

    @keyframes cornerPulse {
      0%   { opacity: 0.55; transform: scale(1); }
      100% { opacity: 0.95; transform: scale(1.06); }
    }

    .entry-topline {
      position: relative;
      z-index: 3;
      margin-bottom: 14px;
      font-size: 10px;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: rgba(255, 170, 195, 0.68);
      text-shadow: 0 0 8px rgba(255, 0, 76, 0.30);
    }

    .entry-glyph-row {
      position: relative;
      z-index: 3;
      margin-bottom: 8px;
      font-size: 17px;
      letter-spacing: 0.28em;
      color: rgba(255, 72, 115, 0.85);
      text-shadow:
        0 0 10px rgba(255, 0, 76, 0.34),
        0 0 14px rgba(50, 200, 255, 0.12);
    }

    .entry-kicker {
      position: relative;
      z-index: 3;
      margin: 0 0 16px;
      font-size: 12px;
      letter-spacing: 0.34em;
      color: rgba(230, 245, 255, 0.72);
      text-transform: uppercase;
    }

    #audio-start {
      appearance: none;
      position: relative;
      z-index: 4;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: min(82vw, 500px);
      min-height: 108px;
      margin: 6px auto 0;
      padding: 20px 18px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255, 40, 95, 0.65);
      background:
        linear-gradient(180deg, rgba(34, 0, 16, 0.95), rgba(8, 0, 10, 0.98)),
        radial-gradient(circle at 50% 45%, rgba(255, 0, 76, 0.12), transparent 60%);
      color: #ffeaf0;
      cursor: pointer;
      overflow: hidden;
      box-shadow:
        0 0 18px rgba(255, 0, 76, 0.18),
        0 0 52px rgba(80, 0, 255, 0.08),
        inset 0 0 20px rgba(255, 35, 90, 0.08);
      transition: transform 140ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    #audio-start:hover,
    #audio-start:active {
      transform: translateY(-1px) scale(1.01);
      border-color: rgba(255, 75, 120, 0.85);
      box-shadow:
        0 0 24px rgba(255, 0, 76, 0.26),
        0 0 64px rgba(0, 210, 255, 0.12),
        inset 0 0 22px rgba(255, 35, 90, 0.14);
    }

    #audio-start.playing {
      border-color: rgba(0, 255, 210, 0.55);
      box-shadow:
        0 0 22px rgba(0, 255, 200, 0.20),
        inset 0 0 22px rgba(0, 255, 200, 0.08);
    }

    .entry-button-frame,
    .entry-button-glow {
      position: absolute;
      inset: 8px;
      border-radius: 14px;
      pointer-events: none;
    }

    .entry-button-frame {
      border: 1px solid rgba(255, 70, 118, 0.22);
      box-shadow: inset 0 0 14px rgba(255, 0, 76, 0.08);
    }

    .entry-button-glow {
      background:
        linear-gradient(90deg, transparent, rgba(255, 0, 70, 0.12), transparent),
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.04) 0px,
          rgba(255,255,255,0.04) 1px,
          transparent 2px,
          transparent 4px
        );
      mix-blend-mode: screen;
      animation: buttonSweep 2.8s linear infinite;
      opacity: 0.65;
    }

    @keyframes buttonSweep {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }

    .glitch-wrap {
      position: relative;
      display: inline-block;
      z-index: 3;
      line-height: 1.02;
    }

    .glitch-main,
    .glitch-red,
    .glitch-cyan {
      display: block;
      font-size: clamp(24px, 4.8vw, 38px);
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .glitch-main {
      position: relative;
      z-index: 3;
      color: #fff2f5;
      text-shadow:
        0 0 10px rgba(255, 0, 76, 0.26),
        0 0 20px rgba(0, 215, 255, 0.08);
    }

    .glitch-red,
    .glitch-cyan {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.0;
    }

    .glitch-red {
      color: #ff245d;
      animation: glitchRedStrong 1.5s steps(2, end) infinite;
    }

    .glitch-cyan {
      color: #42d7ff;
      animation: glitchCyanStrong 1.1s steps(2, end) infinite;
    }

    @keyframes glitchRedStrong {
      0%, 85%, 100% { transform: translate(0,0); opacity: 0; }
      86% { transform: translate(-3px, 0); opacity: 0.84; }
      89% { transform: translate(2px, -1px); opacity: 0.62; }
      93% { transform: translate(-2px, 1px); opacity: 0.82; }
      96% { transform: translate(1px, 0); opacity: 0; }
    }

    @keyframes glitchCyanStrong {
      0%, 87%, 100% { transform: translate(0,0); opacity: 0; }
      88% { transform: translate(2px, 0); opacity: 0.72; }
      91% { transform: translate(-1px, 1px); opacity: 0.86; }
      95% { transform: translate(3px, -1px); opacity: 0.55; }
      97% { transform: translate(0,0); opacity: 0; }
    }

    .entry-button-sub {
      position: relative;
      z-index: 3;
      display: block;
      margin-top: 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: rgba(255, 190, 210, 0.68);
      text-transform: uppercase;
    }

    .entry-track {
      position: relative;
      z-index: 3;
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: rgba(210, 238, 255, 0.72);
      text-transform: uppercase;
    }

    .entry-sub {
      position: relative;
      z-index: 3;
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 0.09em;
      color: rgba(255, 210, 225, 0.68);
      text-transform: uppercase;
    }

    .entry-footerline {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 70, 118, 0.16);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(160, 220, 255, 0.66);
    }

    @media (max-width: 700px) {
      #entry-panel {
        width: min(92vw, 660px);
        padding: 24px 16px 18px;
      }

      .entry-topline,
      .entry-button-sub,
      .entry-footerline {
        letter-spacing: 0.12em;
      }

  <script>
    AFRAME.registerComponent('pulse-opacity', {
      schema: {
        min: { default: 0.35 },
        max: { default: 0.95 },
        speed: { default: 0.0018 }
      },
      tick: function (time) {
        const t = (Math.sin(time * this.data.speed) + 1) / 2;
        const opacity = this.data.min + (this.data.max - this.data.min) * t;
        this.el.setAttribute('material', 'opacity', opacity);
      }
    });

    AFRAME.registerComponent('slow-drift', {
      schema: {
        amount: { default: 0.04 },
        speed: { default: 0.001 },
        axis: { default: 'y' }
      },
      init: function () {
        this.base = this.el.object3D.position.clone();
      },
      tick: function (time) {
        const offset = Math.sin(time * this.data.speed) * this.data.amount;
        if (this.data.axis === 'x') this.el.object3D.position.x = this.base.x + offset;
        if (this.data.axis === 'y') this.el.object3D.position.y = this.base.y + offset;
        if (this.data.axis === 'z') this.el.object3D.position.z = this.base.z + offset;
      }
    });

    AFRAME.registerComponent('clamp-player', {
      schema: {
        minX: { default: -1.65 },
        maxX: { default: 1.65 },
        minZ: { default: -1.35 },
        maxZ: { default: 1.25 }
      },
      tick: function () {
        const p = this.el.object3D.position;
        p.x = Math.max(this.data.minX, Math.min(this.data.maxX, p.x));
        p.z = Math.max(this.data.minZ, Math.min(this.data.maxZ, p.z));
      }
    });
  </script>

<script>
if (window.AFRAME) {
  if (!AFRAME.components["flicker-material"]) {
    AFRAME.registerComponent("flicker-material", {
      schema: {
        min: {default: 0.18},
        max: {default: 1.0},
        speed: {default: 90}
      },
      init: function () {
        this.timer = 0;
      },
      tick: function (time, dt) {
        this.timer += dt;
        if (this.timer > this.data.speed + Math.random() * 140) {
          this.timer = 0;
          const strong = Math.random() > 0.18;
          const opacity = strong
            ? this.data.min + Math.random() * (this.data.max - this.data.min)
            : 0.03 + Math.random() * 0.12;
          const intensity = strong
            ? 1.1 + Math.random() * 2.2
            : 0.2 + Math.random() * 0.6;

          this.el.setAttribute("material", "opacity", opacity);
          this.el.setAttribute("material", "emissiveIntensity", intensity);
        }
      }
    });
  }

  if (!AFRAME.components["left-portal-unicursal"]) {
    AFRAME.registerComponent("left-portal-unicursal", {
      init: function () {
        const el = this.el;

        // dark screen inside the existing ring
        const screen = document.createElement("a-circle");
        screen.setAttribute("radius", "0.31");
        screen.setAttribute("position", "0 0 -0.004");
        screen.setAttribute("material", "shader: flat; color: #220015; opacity: 0.92; transparent: true");
        el.appendChild(screen);

        // soft inner glow
        const glowDisc = document.createElement("a-circle");
        glowDisc.setAttribute("radius", "0.23");
        glowDisc.setAttribute("position", "0 0 -0.003");
        glowDisc.setAttribute("material", "shader: flat; color: #370018; opacity: 0.24; transparent: true");
        el.appendChild(glowDisc);

        const group = document.createElement("a-entity");
        group.setAttribute("id", "left-portal-unicursal-lines");
        el.appendChild(group);

        // approximate unicursal hexagram path
        const pts = [
          [ 0.00,  0.22],
          [ 0.12,  0.07],
          [ 0.29,  0.07],
          [ 0.12, -0.05],
          [ 0.21, -0.22],
          [ 0.00, -0.09],
          [-0.21, -0.22],
          [-0.12, -0.05],
          [-0.29,  0.07],
          [-0.12,  0.07],
          [ 0.00,  0.22]
        ];

        function addSegment(a, b, thickness = 0.016) {
          const dx = b[0] - a[0];
          const dy = b[1] - a[1];
          const len = Math.sqrt(dx * dx + dy * dy);
          const mx = (a[0] + b[0]) / 2;
          const my = (a[1] + b[1]) / 2;
          const ang = Math.atan2(dy, dx) * 180 / Math.PI;

          // outer glow strip
          const glow = document.createElement("a-box");
          glow.setAttribute("position", `${mx} ${my} 0.002`);
          glow.setAttribute("width", (len + 0.010).toFixed(4));
          glow.setAttribute("height", (thickness * 2.1).toFixed(4));
          glow.setAttribute("depth", "0.004");
          glow.setAttribute("rotation", `0 0 ${ang}`);
          glow.setAttribute("material", "shader: flat; color: #ff3355; opacity: 0.18; transparent: true");
          glow.setAttribute("flicker-material", "min: 0.05; max: 0.22; speed: 70");
          group.appendChild(glow);

          // bright core strip
          const core = document.createElement("a-box");
          core.setAttribute("position", `${mx} ${my} 0.006`);
          core.setAttribute("width", len.toFixed(4));
          core.setAttribute("height", thickness.toFixed(4));
          core.setAttribute("depth", "0.008");
          core.setAttribute("rotation", `0 0 ${ang}`);
          core.setAttribute(
            "material",
            "color: #ff4466; emissive: #ff002a; emissiveIntensity: 2.4; opacity: 0.95; transparent: true"
          );
          core.setAttribute("flicker-material", "min: 0.32; max: 1.0; speed: 85");
          group.appendChild(core);
        }

        for (let i = 0; i < pts.length - 1; i++) {
          addSegment(pts[i], pts[i + 1]);
        }

        // small center spark
        const spark = document.createElement("a-circle");
        spark.setAttribute("radius", "0.022");
        spark.setAttribute("position", "0 0 0.008");
        spark.setAttribute("material", "shader: flat; color: #ff6680; opacity: 0.95; transparent: true");
        spark.setAttribute("flicker-material", "min: 0.25; max: 1.0; speed: 60");
        group.appendChild(spark);
      }
    });
  }
}
</script>


<script>
if (window.AFRAME && !AFRAME.components["portal-bolt-v2"]) {
  AFRAME.registerComponent("portal-bolt-v2", {
    init: function () {
      const el = this.el;

      // wipe old portal children so the previous wrong sigil disappears
      while (el.firstChild) el.removeChild(el.firstChild);

      this.boundary = 0.095;   // movement radius inside the circle
      this.pos = { x: 0, y: 0 };
      this.vel = { x: 0.065, y: 0.048 };
      this.spin = 0;

      // dark screen inside the red ring
      const screen = document.createElement("a-circle");
      screen.setAttribute("radius", "0.315");
      screen.setAttribute("position", "0 0 -0.004");
      screen.setAttribute("material", "shader: flat; color: #170014; opacity: 0.94; transparent: true; side: double");
      el.appendChild(screen);

      // subtle inner glow
      const inner = document.createElement("a-circle");
      inner.setAttribute("radius", "0.255");
      inner.setAttribute("position", "0 0 -0.003");
      inner.setAttribute("material", "shader: flat; color: #2a0018; opacity: 0.22; transparent: true; side: double");
      el.appendChild(inner);

      // moving group
      this.mover = document.createElement("a-entity");
      this.mover.setAttribute("position", "0 0 0.008");
      el.appendChild(this.mover);

      // glow copy behind the main sigil
      this.glow = document.createElement("a-image");
      this.glow.setAttribute("src", "#unicursal-bolt");
      this.glow.setAttribute("width", "0.54");
      this.glow.setAttribute("height", "0.54");
      this.glow.setAttribute("position", "0 0 0");
      this.glow.setAttribute("material", "shader: flat; transparent: true; opacity: 0.24; alphaTest: 0.02; side: double");
      this.mover.appendChild(this.glow);

      // main sigil
      this.bolt = document.createElement("a-image");
      this.bolt.setAttribute("src", "#unicursal-bolt");
      this.bolt.setAttribute("width", "0.44");
      this.bolt.setAttribute("height", "0.44");
      this.bolt.setAttribute("position", "0 0 0.003");
      this.bolt.setAttribute("material", "shader: flat; transparent: true; opacity: 0.96; alphaTest: 0.02; side: double");
      this.mover.appendChild(this.bolt);

      // tiny center spark
      this.spark = document.createElement("a-circle");
      this.spark.setAttribute("radius", "0.012");
      this.spark.setAttribute("position", "0 0 0.006");
      this.spark.setAttribute("material", "shader: flat; color: #ff4d6d; opacity: 0.75; transparent: true");
      this.mover.appendChild(this.spark);
    },

    tick: function (time, dt) {
      const sec = dt / 1000;

      // drift
      let nx = this.pos.x + this.vel.x * sec;
      let ny = this.pos.y + this.vel.y * sec;

      // bounce off circular perimeter
      const d = Math.sqrt(nx * nx + ny * ny);
      if (d > this.boundary) {
        const n = { x: nx / d, y: ny / d };
        const dot = this.vel.x * n.x + this.vel.y * n.y;
        this.vel.x = this.vel.x - 2 * dot * n.x;
        this.vel.y = this.vel.y - 2 * dot * n.y;

        nx = n.x * this.boundary;
        ny = n.y * this.boundary;
      }

      this.pos.x = nx;
      this.pos.y = ny;

      // slow spin
      this.spin += dt * 0.018;

      // lightning-style burst flicker: mostly alive, sometimes white-hot
      const wave = Math.abs(Math.sin(time * 0.018));
      const micro = Math.random();
      const burst = micro > 0.90 ? 1.0 : 0.0;
      const blackout = micro < 0.08 ? 1.0 : 0.0;

      const flicker = blackout
        ? 0.08 + Math.random() * 0.12
        : Math.min(1.0, 0.45 + wave * 0.35 + burst * 0.55);

      const glowFlicker = blackout
        ? 0.05
        : Math.min(0.52, 0.16 + wave * 0.16 + burst * 0.30);

      const pulse = 1.05 + 0.12 * burst + 0.045 * Math.sin(time * 0.006);

      this.mover.object3D.position.set(this.pos.x, this.pos.y, 0.008);
      this.mover.object3D.rotation.z = this.spin * Math.PI / 180;

      this.bolt.object3D.scale.set(pulse, pulse, 1);
      this.glow.object3D.scale.set(1.12 * pulse, 1.12 * pulse, 1);

      this.bolt.setAttribute("material", "opacity", flicker);
      this.glow.setAttribute("material", "opacity", glowFlicker);
      this.spark.setAttribute("material", "opacity", 0.35 + 0.4 * flicker);
    }
  });
}

// retarget the existing portal entity to the new component
window.addEventListener("load", function () {
  const portal = document.querySelector("#left-floor-lightning-portal");
  if (!portal) return;

  portal.removeAttribute("left-portal-unicursal");
  portal.setAttribute("portal-bolt-v2", "");
});
</script>


<script>
if (window.AFRAME && !AFRAME.components["arcade-glitch-vfx"]) {
  AFRAME.registerComponent("arcade-glitch-vfx", {
    init: function () {
      this.screen = this.el.querySelector("#arcade-screen-glow");
      this.rgbR = this.el.querySelector("#arcade-screen-r");
      this.rgbG = this.el.querySelector("#arcade-screen-g");
      this.rgbB = this.el.querySelector("#arcade-screen-b");
      this.scan1 = this.el.querySelector("#arcade-glitch-bar-1");
      this.scan2 = this.el.querySelector("#arcade-glitch-bar-2");
      this.scan3 = this.el.querySelector("#arcade-glitch-bar-3");
      this.marquee = this.el.querySelector("#arcade-marquee-glow");
      this.buttons = Array.from(this.el.querySelectorAll(".arcade-button-light"));
      this.joy = this.el.querySelector("#arcade-joystick-light");
      this.frontLight = this.el.querySelector("#arcade-red-spill");
      this.blueLight = this.el.querySelector("#arcade-blue-spill");
    },

    tick: function (time, dt) {
      const fast = Math.sin(time * 0.055);
      const faster = Math.sin(time * 0.115);
      const burst = Math.random() > 0.78;
      const hardCut = Math.random() > 0.92;

      const palette = [
        "#ff0033",
        "#00ff66",
        "#2277ff",
        "#ff00cc",
        "#00ffff",
        "#ffffff"
      ];

      const baseOpacity = hardCut ? 0.18 : 0.48 + Math.abs(fast) * 0.34;

      if (this.screen) {
        this.screen.setAttribute("material", "color", palette[Math.floor(Math.random() * palette.length)]);
        this.screen.setAttribute("material", "opacity", burst ? 0.95 : baseOpacity);
        this.screen.object3D.scale.set(
          burst ? 1.0 + (Math.random() - 0.5) * 0.08 : 1.0,
          burst ? 1.0 + (Math.random() - 0.5) * 0.035 : 1.0,
          1
        );
      }

      // RGB color-channel ghosts: fast flickering offsets
      const rgbLayers = [
        [this.rgbR, "#ff0033", -0.012, 0.004],
        [this.rgbG, "#00ff66", 0.000, -0.003],
        [this.rgbB, "#2277ff", 0.012, 0.005]
      ];

      rgbLayers.forEach(([layer, color, ox, oy], i) => {
        if (!layer) return;
        const visible = Math.random() > 0.18;
        const jitterX = ox + (Math.random() - 0.5) * 0.018;
        const jitterY = oy + (Math.random() - 0.5) * 0.010;
        layer.setAttribute("position", `${jitterX.toFixed(3)} ${(1.18 + jitterY).toFixed(3)} ${(0.386 + i * 0.004).toFixed(3)}`);
        layer.setAttribute("material", "color", color);
        layer.setAttribute("material", "opacity", visible ? 0.18 + Math.random() * 0.42 : 0.02);
      });

      // Thin RGB glitch strips, not big chunky bars
      const bars = [this.scan1, this.scan2, this.scan3];
      bars.forEach((bar, i) => {
        if (!bar) return;
        const visible = Math.random() > 0.28;
        const y = 1.18 + (Math.random() - 0.5) * 0.30;
        const x = (Math.random() - 0.5) * 0.035;
        const z = 0.398 + i * 0.006;
        const width = 0.18 + Math.random() * 0.46;
        const height = 0.006 + Math.random() * 0.014;
        const color = palette[Math.floor(Math.random() * 3)];

        bar.setAttribute("position", `${x.toFixed(3)} ${y.toFixed(3)} ${z.toFixed(3)}`);
        bar.setAttribute("width", width.toFixed(3));
        bar.setAttribute("height", height.toFixed(3));
        bar.setAttribute("material", "color", color);
        bar.setAttribute("material", "opacity", visible ? 0.38 + Math.random() * 0.60 : 0.0);
      });

      if (this.marquee) {
        const op = burst ? 0.98 : 0.34 + Math.abs(faster) * 0.35;
        this.marquee.setAttribute("material", "color", Math.random() > 0.65 ? "#ff0033" : "#ffd36a");
        this.marquee.setAttribute("material", "opacity", op);
      }

      this.buttons.forEach((b, i) => {
        const colors = ["#ff0033", "#00ff66", "#2277ff"];
        b.setAttribute("material", "color", colors[(Math.floor(time / 90) + i) % 3]);
        b.setAttribute("material", "opacity", 0.55 + Math.random() * 0.40);
      });

      if (this.joy) {
        this.joy.setAttribute("material", "color", Math.random() > 0.5 ? "#ff0033" : "#2277ff");
        this.joy.setAttribute("material", "opacity", 0.55 + Math.random() * 0.35);
      }

      if (this.frontLight) {
        this.frontLight.setAttribute("light", "color", Math.random() > 0.5 ? "#ff123f" : "#00ff66");
        this.frontLight.setAttribute("light", "intensity", burst ? 2.7 : 0.75 + Math.random() * 0.75);
      }

      if (this.blueLight) {
        this.blueLight.setAttribute("light", "color", Math.random() > 0.5 ? "#2277ff" : "#00ffff");
        this.blueLight.setAttribute("light", "intensity", burst ? 2.3 : 0.55 + Math.random() * 0.55);
      }
    }
  });
}
</script>


<script>
if (window.AFRAME && !AFRAME.components["bounded-vr-locomotion"]) {
  AFRAME.registerComponent("bounded-vr-locomotion", {
    schema: {
      speed: { default: 1.25 },
      turnDegrees: { default: 28 },
      minX: { default: -1.75 },
      maxX: { default: 1.75 },
      minZ: { default: -3.05 },
      maxZ: { default: 0.70 }
    },

    init: function () {
      this.turnCooldown = 0;
      this.tmp = new THREE.Vector3();
      this.dir = new THREE.Vector3();
    },

    getAxes: function () {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      let moveX = 0, moveY = 0, turnX = 0;

      for (const gp of pads) {
        if (!gp || !gp.connected || !gp.axes) continue;

        // Quest / common WebXR mappings usually expose left stick on axes 2/3
        // and right stick on axes 0/1 or 2/3 depending on hand/controller.
        const ax = gp.axes;

        // Prefer strongest movement axes pair.
        const candidates = [
          [ax[2] || 0, ax[3] || 0],
          [ax[0] || 0, ax[1] || 0]
        ];

        for (const [x, y] of candidates) {
          if (Math.abs(x) + Math.abs(y) > Math.abs(moveX) + Math.abs(moveY)) {
            moveX = x;
            moveY = y;
          }
        }

        // Right-stick/snap-turn fallback: use horizontal axis when strong.
        for (const x of [ax[0] || 0, ax[2] || 0]) {
          if (Math.abs(x) > Math.abs(turnX)) turnX = x;
        }
      }

      const dead = 0.18;
      if (Math.abs(moveX) < dead) moveX = 0;
      if (Math.abs(moveY) < dead) moveY = 0;
      if (Math.abs(turnX) < 0.72) turnX = 0;

      return { moveX, moveY, turnX };
    },

    tick: function (time, dt) {
      const seconds = Math.min(dt / 1000, 0.05);
      const rig = this.el;
      const camera = rig.querySelector("[camera]");
      if (!camera) return;

      const axes = this.getAxes();

      // Snap turn.
      this.turnCooldown -= dt;
      if (axes.turnX && this.turnCooldown <= 0) {
        const rot = rig.getAttribute("rotation");
        rot.y -= Math.sign(axes.turnX) * this.data.turnDegrees;
        rig.setAttribute("rotation", rot);
        this.turnCooldown = 320;
      }

      // Movement relative to headset yaw.
      if (axes.moveX || axes.moveY) {
        const camWorldRot = new THREE.Euler();
        camWorldRot.setFromQuaternion(camera.object3D.getWorldQuaternion(new THREE.Quaternion()), "YXZ");

        const yaw = camWorldRot.y;
        const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
        const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

        const pos = rig.getAttribute("position");
        const speed = this.data.speed * seconds;

        pos.x += right.x * axes.moveX * speed;
        pos.z += right.z * axes.moveX * speed;

        // Negative stick Y usually means forward.
        pos.x += forward.x * (-axes.moveY) * speed;
        pos.z += forward.z * (-axes.moveY) * speed;

        // Bound the player inside the theatrical set.
        pos.x = Math.max(this.data.minX, Math.min(this.data.maxX, pos.x));
        pos.z = Math.max(this.data.minZ, Math.min(this.data.maxZ, pos.z));
        pos.y = 1.6;

        rig.setAttribute("position", pos);
      }
    }
  });
}
</script>


<script id="audio-start-handler">
window.addEventListener("load", function () {
  const btn = document.getElementById("audio-start");
  const audio = document.getElementById("arcade-theme-audio");
  const overlay = document.getElementById("entry-overlay");

  const playlist = [
    { title: "Forget Me Remix 93", src: "assets/audio/track_01_forget_me.wav" },
    { title: "Forest", src: "assets/audio/track_02_forest.mp3" },
    { title: "The Zelda Song", src: "assets/audio/track_03_zelda.mp3" },
    { title: "1950s Void Theory", src: "assets/audio/track_04_1950s_void.mp3" },
    { title: "Here's RD", src: "assets/audio/track_05_heres_rd.mp3" }
  ];

  if (!btn || !audio || !overlay) return;

  const selected = playlist[Math.floor(Math.random() * playlist.length)];
  audio.src = selected.src;
  audio.loop = true;
  audio.volume = 0.58;
  audio.preload = "auto";

  let dismissed = false;

  function hideOverlay() {
    if (dismissed) return;
    dismissed = true;
    overlay.classList.add("hidden");
    setTimeout(function () {
      overlay.style.display = "none";
    }, 520);
  }

  async function startAudioAndEnter() {
    try {
      audio.muted = false;
      audio.volume = 0.58;

      const result = audio.play();
      if (result && typeof result.then === "function") {
        await result;
      }

      if (!audio.paused) {
        btn.classList.add("playing");
        hideOverlay();
        return true;
      }

      btn.classList.remove("playing");
      return false;
    } catch (err) {
      btn.classList.remove("playing");
      return false;
    }
  }

  setTimeout(function () {
    startAudioAndEnter();
  }, 800);

  btn.addEventListener("click", function (event) {
    event.preventDefault();
    event.stopPropagation();
    startAudioAndEnter();
  });

  const unlock = function () {
    if (!dismissed) startAudioAndEnter();
    window.removeEventListener("pointerdown", unlock);
    window.removeEventListener("touchstart", unlock);
    window.removeEventListener("click", unlock);
  };

  window.addEventListener("pointerdown", unlock);
  window.addEventListener("touchstart", unlock);
  window.addEventListener("click", unlock);

  audio.addEventListener("playing", function () {
    btn.classList.add("playing");
  });

  audio.addEventListener("error", function () {
    btn.classList.remove("playing");
    console.warn("Audio failed to load:", selected.src, audio.error);
  });
});
</script>


<script>
if (window.AFRAME && !AFRAME.components["occult-arcade-screen"]) {
  AFRAME.registerComponent("occult-arcade-screen", {
    schema: {
      theme: { default: "tarot" }
    },

    init: function () {
      this.screen = this.el.querySelector(".screen-fill");
      this.title = this.el.querySelector(".screen-title");
      this.sub = this.el.querySelector(".screen-sub");
      this.rune = this.el.querySelector(".screen-rune");
      this.bar1 = this.el.querySelector(".screen-bar-a");
      this.bar2 = this.el.querySelector(".screen-bar-b");
      this.baseY = this.el.object3D.position.y;
      this.offset = Math.random() * Math.PI * 2;
      this.lastFrame = 0;
      this.fastUntil = 0;
      this.frameIndex = 0;

      this.framesByTheme = {
        tarot: [
          { title: "FOOL'S ASCENT", sub: "DRAW / LEAP / TRANSCEND", rune: "0 • I • XXI", color: "#ff2c6d", accent: "#42d7ff" },
          { title: "TOWER RUN", sub: "STRIKE THE FALSE SELF", rune: "XVI // MARS", color: "#ff5533", accent: "#ffe066" },
          { title: "BABALON MODE", sub: "CUPS / FIRE / WILL", rune: "XI // LUST", color: "#ff1e7c", accent: "#8a5cff" }
        ],
        qabalah: [
          { title: "PATHWALKER", sub: "TRACE THE SEPHIROTH", rune: "10 → 1", color: "#00d5ff", accent: "#ff3864" },
          { title: "ABYSS DIVE", sub: "CROSS WITHOUT FALLING", rune: "DAATH?", color: "#5b8cff", accent: "#ff66aa" },
          { title: "LIGHTNING FLASH", sub: "EMANATE / RETURN", rune: "KETHER GRID", color: "#6ef3ff", accent: "#f9ff62" }
        ],
        alchemy: [
          { title: "RUBEDO RUSH", sub: "FIX THE RED STONE", rune: "N • A • R", color: "#ff3a2f", accent: "#ffd166" },
          { title: "NIGREDO LOOP", sub: "DISSOLVE THE MASK", rune: "☿ ☉ ☽", color: "#6f57ff", accent: "#42d7ff" },
          { title: "AZOTH ENGINE", sub: "SEAL THE ELIXIR", rune: "SOLVE // COAGULA", color: "#ff7a00", accent: "#ff2c6d" }
        ],
        enochian: [
          { title: "CALL OF THE AYR", sub: "OPEN THE GATES", rune: "ZAX / TEX / ARN", color: "#42d7ff", accent: "#9d4dff" },
          { title: "WATCHTOWER RAID", sub: "TRACE THE TABLETS", rune: "AIR // FIRE", color: "#24ffa8", accent: "#42d7ff" },
          { title: "SIGIL STORM", sub: "NAME / VIBRATE / BREAK", rune: "IAO / ZOD / OXO", color: "#00e1ff", accent: "#ff3864" }
        ]
      };

      this.frames = this.framesByTheme[this.data.theme] || this.framesByTheme.tarot;

      this.el.addEventListener("click", () => {
        this.frameIndex = (this.frameIndex + 1) % this.frames.length;
        this.fastUntil = performance.now() + 3200;
        this.renderFrame();
      });

      this.renderFrame();
    },

    renderFrame: function () {
      const f = this.frames[this.frameIndex % this.frames.length];
      if (this.screen) {
        this.screen.setAttribute("material", "color", f.color);
        this.screen.setAttribute("material", "opacity", 0.92);
      }
      if (this.title) this.title.setAttribute("value", f.title);
      if (this.sub) this.sub.setAttribute("value", f.sub);
      if (this.rune) this.rune.setAttribute("value", f.rune);

      if (this.bar1) {
        this.bar1.setAttribute("material", "color", f.accent);
        this.bar1.setAttribute("width", (0.18 + Math.random() * 0.22).toFixed(3));
      }

      if (this.bar2) {
        this.bar2.setAttribute("material", "color", f.color);
        this.bar2.setAttribute("width", (0.24 + Math.random() * 0.18).toFixed(3));
      }
    },

    tick: function (time, dt) {
      const interval = time < this.fastUntil ? 180 : 920;

      if (time - this.lastFrame > interval) {
        this.lastFrame = time;
        this.frameIndex = (this.frameIndex + 1) % this.frames.length;
        this.renderFrame();
      }

      const bob = Math.sin(time * 0.00115 + this.offset) * 0.015;
      this.el.object3D.position.y = this.baseY + bob;

      if (this.screen) {
        const opacity = 0.74 + Math.abs(Math.sin(time * 0.004 + this.offset)) * 0.22;
        this.screen.setAttribute("material", "opacity", opacity);
      }
    }
  });
}
</script>
